<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aly's Portfolio</title>
</head>
<body>
    <header>
        <h2>Aly Ouellette's Portfolio</h2>
        <nav>
            <a href="index.html">Home</a>
            <a href="pages/passion-project.html">Passion Project</a>
            <a href="school.html">School Work</a>
            <a href="about.html">School Work</a>
        </nav>
    </header>
    <div class="slideshow" id="slideshow">

    <!-- Navigation -->
    <button class="nav-button prev" id="prevBtn">&#10094;</button>
    <button class="nav-button next" id="nextBtn">&#10095;</button>

    <!-- Indicator dots -->
    <div class="indicators" id="indicators"></div>

    </div>

    <script>
        const portfolioPieces = [
            {
            title: "Project One",
            description: "Brand identity and packaging design.",
            image: "images/project1.jpg"
            },
            {
            title: "Project Two",
            description: "Interactive web experience.",
            image: "images/project2.jpg"
            },
            {
            title: "Project Three",
            description: "Illustration and typography system.",
            image: "images/project3.jpg"
            },
            {
            title: "Project Four",
            description: "Photography and editorial layout.",
            image: "images/project4.jpg"
            }
        ];

        // Shuffle array
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        const pieces = shuffle([...portfolioPieces]);

        const slideshow = document.getElementById("slideshow");
        const indicators = document.getElementById("indicators");

        let currentSlide = 0;
        let slideInterval;
        let isPaused = false;

        // Create slides
        pieces.forEach((piece, index) => {
            const slide = document.createElement("div");

            slide.className = `slide ${index === 0 ? "active" : ""}`;

            slide.innerHTML = `
            <img src="${piece.image}" alt="${piece.title}">
            <div class="caption">
                <h2>${piece.title}</h2>
                <p>${piece.description}</p>
            </div>
            `;

            slideshow.appendChild(slide);

            // Dots
            const dot = document.createElement("div");

            dot.className = `dot ${index === 0 ? "active" : ""}`;

            dot.addEventListener("click", () => {
            goToSlide(index);
            });

            indicators.appendChild(dot);
        });

        const slides = document.querySelectorAll(".slide");
        const dots = document.querySelectorAll(".dot");

        function updateSlides() {
            slides.forEach((slide, index) => {
            slide.classList.toggle("active", index === currentSlide);
            });

            dots.forEach((dot, index) => {
            dot.classList.toggle("active", index === currentSlide);
            });
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % slides.length;
            updateSlides();
        }

        function prevSlide() {
            currentSlide = (currentSlide - 1 + slides.length) % slides.length;
            updateSlides();
        }

        function goToSlide(index) {
            currentSlide = index;
            updateSlides();
        }

        function startSlideshow() {
            slideInterval = setInterval(() => {
            if (!isPaused) {
                nextSlide();
            }
            }, 4000);
        }

        // Pause on hover
        slideshow.addEventListener("mouseenter", () => {
            isPaused = true;
        });

        slideshow.addEventListener("mouseleave", () => {
            isPaused = false;
        });

        // Buttons
        document.getElementById("nextBtn").addEventListener("click", nextSlide);
        document.getElementById("prevBtn").addEventListener("click", prevSlide);

        startSlideshow();
    </script>
</body>
</html>
